name: worksense_app
description: WorkSense - Monitoreo de Productividad con IA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Navegacion ──────────────────────────────────────────────
  go_router: ^14.0.0

  # ── Estado (Riverpod) ────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1

  # ── Base de datos remota (Supabase) ──────────────────────────
  supabase_flutter: ^2.5.0

  # ── Base de datos local (Drift / SQLite) ─────────────────────
  drift: ^2.19.1
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Camara y ML Kit ──────────────────────────────────────────
  camera: ^0.11.0
  google_mlkit_pose_detection: ^0.13.0
  google_mlkit_face_detection: ^0.12.0
  google_mlkit_commons: ^0.9.0

  # ── Geolocalizacion ──────────────────────────────────────────
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # ── Notificaciones locales ───────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Seguridad y almacenamiento ───────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # ── Conectividad ─────────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Generacion de PDF ────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1

  # ── Imagenes ─────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # ── Google Maps ──────────────────────────────────────────────
  google_maps_flutter: ^2.9.0

  # ── Variables de entorno ─────────────────────────────────────
  flutter_dotenv: ^5.2.1

  # ── Utilidades generales ─────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  rxdart: ^0.28.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Generacion de codigo ─────────────────────────────────────
  build_runner: ^2.4.11
  drift_dev: ^2.19.1
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

  # ── Testing ──────────────────────────────────────────────────
  mocktail: ^1.0.4
  fake_async: ^1.3.1

  # ── Linting ──────────────────────────────────────────────────
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
  
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700